      if (
        location.pathname.includes("morning") ||
        location.pathname.includes("evening")
      ) {
        document.getElementById("content").innerHTML = `
        <h2>${
          location.pathname.includes("morning")
            ? "أذكار الصباح"
            : "أذكار المساء"
        }</h2>
        <div class="form-control count-form">
          <label>اختر عدد الأذكار:</label>
          <div class="zikr-options">
            <button onclick="showAzkarSection(5)">5</button>
            <button onclick="showAzkarSection(10)">10</button>
            <button onclick="showAzkarSection(15)">15</button>
            <button onclick="showAzkarSection(20)">20</button>
          </div>
        </div>

<div id="azkarList"></div>

      `;
      }

      function updateCountLabel(val) {
        document.getElementById("countLabel").innerText = val;
      }

      function showAzkarSection(count) {
        // تفعيل الزر المحدد
        document
          .querySelectorAll(".zikr-options button")
          .forEach((b) => b.classList.remove("active"));
        event.target.classList.add("active");

        const list = document.getElementById("azkarList");
        list.innerHTML = "";

        const section = azkarSections[count];
        if (!section) {
          list.innerHTML = "<p>لا يوجد أذكار لهذا القسم بعد.</p>";
          return;
        }

        section.forEach((z) => {
          list.innerHTML += `
    <div class="zikr-card" data-max="${z.max}">
      <h3 class="zikr-title">${z.title}</h3>
      <div class="zikr-text">
        ${
          Array.isArray(z.text)
            ? z.text.map((t) => `<p>${t}</p>`).join("")
            : `<p>${z.text}</p>`
        }
      </div>
      <div class="zikr-fadhl">📖 ${z.fadhl}</div>
      <div class="zikr-actions">
        <button class="minus" onclick="decrement(this)">-</button>
        <span class="count">0 / ${z.max}</span>
        <button class="plus" onclick="increment(this)">+</button>
        <button onclick="toggleDone(this)">✔</button>
        <button onclick="copyZikr('${z.text}')">📋 نسخ</button>
      </div>
    </div>
  `;
        });
      }

      function copyZikr(text) {
        navigator.clipboard.writeText(text);
        alert("تم نسخ الذكر ✅");
      }

      function increment(btn) {
        const card = btn.closest(".zikr-card");
        const span = card.querySelector(".count");
        const max = parseInt(card.dataset.max);
        let current = parseInt(span.innerText.split("/")[0]);
        if (current < max) {
          current++;
          span.innerText = current + " / " + max;
          if (current === max) {
            card.classList.add("done");
          }
        }
      }

      function decrement(btn) {
        const card = btn.closest(".zikr-card");
        const span = card.querySelector(".count");
        const max = parseInt(card.dataset.max);
        let current = parseInt(span.innerText.split("/")[0]);
        if (current > 0) {
          current--;
          span.innerText = current + " / " + max;
          if (current < max) {
            card.classList.remove("done");
          }
        }
      }

      function toggleDone(btn) {
        const card = btn.closest(".zikr-card");
        card.classList.toggle("done");
      }
    </script>
